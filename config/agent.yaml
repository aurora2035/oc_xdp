{
  "agent": {
    "name": "openclaw-shopping-assistant",
    "log_level": "INFO"
  },
  "memory": {
    "store_path": "./data/agent_memory.json",
    "max_history_rounds": 3,
    "max_product_records": 5
  },
  "orchestration": {
    "use_upstream_planner": true,
    "strict_upstream_plan": true
  },
  "nlu": {
    "backend": "openvino",
    "model": "/home/xiaodong/upstream/models/Qwen2.5-Coder-3B-Instruct-int8-ov",
    "optimization": "ipex_llm_int8_amx",
    "temperature": 0.0,
    "max_new_tokens": 256
  },
  "embedding": {
    "backend": "transformers",
    "overrides": {
      "model": "bge-m3",
      "device": "cpu",
      "use_ipex": true,
      "amp": "int8"
    }
  },
  "xdp": {
    "asr": {
      "model_name": "whisper",
      "model": /home/shan/asr/whisper-large-v3-fp32-ov,
      "language": "en",
      "task": "transcribe",
      "backend": openvino,
      "inference_precision": "bf16",
      "input": "audio_file",
      "num_runs": 1
    },
    "tts": {
      "tts_model": "cosyvoice2_0.5b",
      "tts_mode": "zero_shot",
      "prompt_text": "希望你以后能够做的比我还好呦。"
    }
  }
}
